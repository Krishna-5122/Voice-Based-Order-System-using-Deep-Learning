<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kitchen Login - Teja's Kitchen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
         :root {
            --bg: #070A13;
            --panel: rgba(255, 255, 255, .06);
            --border: rgba(255, 255, 255, .12);
            --text: rgba(255, 255, 255, .92);
            --brand: #7C3AED;
            --brand2: #06B6D4;
            --shadow: 0 18px 60px rgba(0, 0, 0, .40);
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Inter, system-ui, -apple-system, sans-serif;
            background: radial-gradient(1200px 600px at 25% -10%, rgba(124, 58, 237, .35), transparent 60%), radial-gradient(1200px 700px at 120% 0%, rgba(6, 182, 212, .26), transparent 65%), var(--bg);
            color: var(--text);
        }
        
        .card {
            width: 100%;
            max-width: 380px;
            padding: 32px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
        }
        
        .title {
            margin: 0 0 24px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
        }
        
        .input, .select {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .14);
            background: rgba(0, 0, 0, .22);
            color: white;
            font-size: 15px;
            outline: none;
        }

        .select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right .7em top 50%;
            background-size: .65em auto;
        }
        
        .input:focus, .select:focus {
            border-color: var(--brand2);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }
        
        .btn:hover {
            filter: brightness(1.1);
        }
        
        .error {
            color: #EF4444;
            font-size: 14px;
            margin-bottom: 16px;
            text-align: center;
        }
    </style>
</head>

<body>
    <form class="card" method="POST">
        <h1 class="title">Kitchen Login</h1>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <input class="input" name="username" placeholder="Username" required autofocus />
        <input class="input" name="password" type="password" placeholder="Password" required />
        <select class="select" name="shift">
            <option value="Morning">Morning Shift</option>
            <option value="Night">Night Shift</option>
        </select>
        <button class="btn" type="submit">Login</button>
    </form>
</body>

</html>
