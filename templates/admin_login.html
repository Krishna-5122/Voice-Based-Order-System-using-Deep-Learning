<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login - Teja's Kitchen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
         :root {
            --bg: #070A13;
            --panel: rgba(255, 255, 255, .06);
            --border: rgba(255, 255, 255, .12);
            --text: rgba(255, 255, 255, .92);
            --brand: #7C3AED;
            --brand2: #06B6D4;
            --shadow: 0 18px 60px rgba(0, 0, 0, .40);
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Inter, system-ui, -apple-system, sans-serif;
            background: radial-gradient(1200px 600px at 25% -10%, rgba(124, 58, 237, .35), transparent 60%), radial-gradient(1200px 700px at 120% 0%, rgba(6, 182, 212, .26), transparent 65%), var(--bg);
            color: var(--text);
        }
        
        .card {
            width: 100%;
            max-width: 380px;
            padding: 32px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
        }
        
        .title {
            margin: 0 0 24px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
        }
        
        .input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .14);
            background: rgba(0, 0, 0, .22);
            color: white;
            font-size: 15px;
            outline: none;
        }
        
        .input:focus {
            border-color: var(--brand2);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }
        
        .btn:hover {
            filter: brightness(1.1);
        }
        
        .error {
            color: #EF4444;
            font-size: 14px;
            margin-bottom: 16px;
            text-align: center;
        }
    </style>
</head>

<body>
    <form class="card" method="POST">
        <h1 class="title">Admin Login</h1>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <input class="input" name="username" placeholder="Username" required autofocus />
        <input class="input" name="password" type="password" placeholder="Password" required />
        <button class="btn" type="submit">Login</button>
    </form>
</body>

</html>
