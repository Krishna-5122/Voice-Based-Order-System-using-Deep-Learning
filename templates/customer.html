<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Customer Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #070A13;
        --panel: rgba(255,255,255,.06);
        --border: rgba(255,255,255,.12);
        --text: rgba(255,255,255,.92);
        --muted: rgba(255,255,255,.68);
        --brand: #7C3AED;
        --brand2: #06B6D4;
        --shadow: 0 18px 60px rgba(0,0,0,.40);
        --good: #22C55E;
        --bad: #EF4444;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background:
          radial-gradient(1200px 800px at 20% 10%, rgba(124,58,237,.35), transparent 60%),
          radial-gradient(900px 700px at 85% 0%, rgba(6,182,212,.25), transparent 60%),
          radial-gradient(900px 700px at 70% 90%, rgba(34,197,94,.14), transparent 60%),
          var(--bg);
      }
      .wrap { max-width: 520px; margin: 0 auto; padding: 40px 18px; }
      .card {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255,255,255,.06);
        box-shadow: var(--shadow);
        padding: 20px;
      }
      .title { font-size: 24px; font-weight: 700; margin: 0 0 10px; }
      .sub { color: var(--muted); margin: 0 0 20px; }
      label { font-size: 13px; color: var(--muted); display:block; margin-bottom:6px; }
      input {
        width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,.14);
        background: rgba(0,0,0,.22); color: var(--text); outline: none;
      }
      .row { display: grid; grid-template-columns: 1fr; gap: 14px; }
      .btn {
        display: inline-flex; align-items:center; justify-content:center; gap:8px;
        padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,.14);
        background: linear-gradient(135deg, rgba(124,58,237,.92), rgba(6,182,212,.75));
        color: white; font-weight: 600; cursor: pointer;
      }
      .btn:disabled { opacity: .5; cursor: not-allowed; }
      .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
      .error { margin-top: 10px; padding: 10px 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,.12); background: rgba(0,0,0,.20); color: rgba(255,255,255,.86); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="title">Welcome</div>
        <div class="sub">Enter your details to continue</div>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST" id="custForm">
          <div class="row">
            <div>
              <label>Name</label>
              <input id="name" name="name" placeholder="Your full name" required />
              <div class="hint" id="nameHint"></div>
            </div>
            <div>
              <label>Phone</label>
              <input id="phone" name="phone" placeholder="10-digit mobile" inputmode="numeric" maxlength="10" required />
              <div class="hint" id="phoneHint"></div>
            </div>
            <div>
              <button class="btn" id="continueBtn" disabled>Continue</button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <script>
      const nameEl = document.getElementById('name');
      const phoneEl = document.getElementById('phone');
      const nameHint = document.getElementById('nameHint');
      const phoneHint = document.getElementById('phoneHint');
      const btn = document.getElementById('continueBtn');
      function validate() {
        const name = (nameEl.value || '').trim();
        const phone = (phoneEl.value || '').trim();
        const nameOk = name.length >= 2;
        const phoneOk = /^\d{10}$/.test(phone);
        nameHint.textContent = nameOk ? '' : 'Enter at least 2 characters';
        phoneHint.textContent = phoneOk ? '' : 'Enter 10 digits';
        btn.disabled = !(nameOk && phoneOk);
      }
      nameEl.addEventListener('input', validate);
      phoneEl.addEventListener('input', () => {
        phoneEl.value = phoneEl.value.replace(/[^0-9]/g, '').slice(0, 10);
        validate();
      });
      validate();
    </script>
  </body>
 </html>
